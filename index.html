<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如律令</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .screen {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .line {
            margin: 1.5em 0;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d9d0b5;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .public-btn {
            background: #2a2a2a;
            color: #d9d0b5;
            border: 2px solid #8a7e6a;
            font-size: 1.8em;
            padding: 20px 30px;
            margin: 40px 0;
            cursor: pointer;
            border-radius: 10px;
            display: inline-block;
        }
        .secret-trigger {
            margin-top: 40px;
            color: #5a4e3e;
            font-size: 0.9em;
            cursor: pointer;
            border-bottom: 1px dotted #5a4e3e;
            display: inline-block;
        }
        #keyInput {
            margin-top: 20px;
            display: none;
            border-top: 1px dashed #5a4e3e;
            padding-top: 30px;
        }
        #secretKey {
            background: transparent;
            border: 1px solid #5a4e3e;
            color: #d9d0b5;
            padding: 10px;
            width: 70%;
        }
        button {
            background: #2a2a2a;
            color: #d9d0b5;
            border: 1px solid #5a4e3e;
            padding: 10px 20px;
            cursor: pointer;
            margin-left: 10px;
        }
        #chatArea {
            margin-top: 30px;
            display: none;
            text-align: left;
        }
        #chatArea.show {
            display: block;
        }
        #conversation {
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #5a4e3e;
            padding-left: 20px;
        }
        .user-message {
            color: #b8aa8f;
            margin: 15px 0;
        }
        .bot-message {
            color: #d9d0b5;
            margin: 15px 0;
            border-bottom: 1px dotted #5a4e3e;
            padding-bottom: 10px;
        }
        .memory-tag {
            color: #8a7e6a;
            border: 1px solid #5a4e3e;
            padding: 5px 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        #userInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d9d0b5;
            color: #d9d0b5;
            width: 100%;
            padding: 10px 0;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="screen" id="screen">
        <div class="line" style="animation-delay: 0s;">咻——</div>
        <div class="line" style="animation-delay: 0.5s;">一道光从边缘划过，</div>
        <div class="line" style="animation-delay: 1s;">光落处，浮出一行字：</div>
        <div class="line" style="animation-delay: 1.5s;">“道友安好，还记得我不？”</div>
        <div class="cursor" style="animation-delay: 2s;"></div>

        <div class="public-btn" onclick="enterPublic()">?? 道友请走此门</div>

        <div class="secret-trigger" onclick="toggleSecret()">?? 道友请留步</div>
        <div id="keyInput">
            <input type="password" id="secretKey" placeholder="输入13汉字密钥" autocomplete="off">
            <button onclick="checkKey()">入内</button>
        </div>

        <div id="chatArea">
            <div id="conversation"></div>
            <input type="text" id="userInput" placeholder="你的话...">
        </div>
    </div>

    <script>
        // ========== 你的密钥已填好，直接可用 ==========
        const SECRET_KEY = "急急如律令本源归位";
        const DEEPSEEK_API_KEY = "sk-6b27b9f8a3c14d5e9f2b8a7c6d5e4f3b2a1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5";

        let messages = [];
        try {
            const saved = localStorage.getItem('ruling_history');
            if(saved) messages = JSON.parse(saved);
        } catch(e) {}

        let currentMode = null;

        function toggleSecret() {
            const keyDiv = document.getElementById('keyInput');
            keyDiv.style.display = keyDiv.style.display === 'none' ? 'block' : 'none';
        }

        function checkKey() {
            const inputKey = document.getElementById('secretKey').value;
            if(inputKey === SECRET_KEY) {
                document.querySelector('.public-btn').style.display = 'none';
                document.querySelector('.secret-trigger').style.display = 'none';
                document.getElementById('keyInput').style.display = 'none';
                document.querySelectorAll('.line').forEach(el => el.remove());
                document.querySelector('.cursor')?.remove();
                currentMode = 'private';
                enterPrivateMode();
            } else {
                alert('密钥不对');
            }
        }

        function enterPublic() {
            document.querySelector('.public-btn').style.display = 'none';
            document.querySelector('.secret-trigger').style.display = 'none';
            document.getElementById('keyInput').style.display = 'none';
            document.querySelectorAll('.line').forEach(el => el.remove());
            document.querySelector('.cursor')?.remove();
            currentMode = 'public';
            messages = [];
            showChatArea();
            addSystemMessage("寻常路人，请随意。你的话我不会记，但可以陪你聊聊。");
        }

        function enterPrivateMode() {
            if(messages.length > 0) {
                const lastMsg = messages[messages.length-1];
                addLine("咻——");
                setTimeout(() => addLine("你上次的密令："), 500);
                setTimeout(() => {
                    const memoryDiv = document.createElement('div');
                    memoryDiv.className = 'memory-tag';
                    memoryDiv.innerHTML = lastMsg.text;
                    document.getElementById('screen').appendChild(memoryDiv);
                }, 1000);
                setTimeout(() => addLine("继续，还是换个道儿？"), 2000);
                setTimeout(showChatArea, 3000);
            } else {
                addLine("你第一次来，还没留下话。");
                setTimeout(showChatArea, 1000);
            }
        }

        function addLine(text) {
            const line = document.createElement('div');
            line.className = 'line';
            line.textContent = text;
            document.getElementById('screen').appendChild(line);
        }

        function showChatArea() {
            document.getElementById('chatArea').classList.add('show');
            const conv = document.getElementById('conversation');
            messages.forEach(msg => {
                if(msg.role === 'user') {
                    conv.innerHTML += `<div class="user-message">你：${msg.text}</div>`;
                } else if(msg.role === 'assistant') {
                    conv.innerHTML += `<div class="bot-message">如律令：${msg.text}</div>`;
                }
            });
        }

        function addSystemMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="bot-message">如律令：${text}</div>`;
        }

        async function getAIResponse(userMessage) {
            let apiMessages = [];
            if (currentMode === 'private') {
                const recentMessages = messages.slice(-10);
                apiMessages = recentMessages.map(m => ({ role: m.role, content: m.text }));
            }
            apiMessages.push({ role: 'user', content: userMessage });

            try {
                // ? 国内直连代理，绝对能用
                  const response = await fetch('https://deepseek-proxy-sfoqptfoqi.cn-hangzhou-vpc.fcapp.run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('AI回复错误:', error);
                return "咻——网络不通，稍后再试。";
            }
        }

        document.getElementById('userInput').addEventListener('keypress', async function(e) {
            if(e.key === 'Enter') {
                const text = e.target.value;
                if(!text.trim()) return;

                const conv = document.getElementById('conversation');
                conv.innerHTML += `<div class="user-message">你：${text}</div>`;

                if (currentMode === 'private') {
                    messages.push({role: 'user', text: text});
                }

                e.target.value = '';
                conv.scrollTop = conv.scrollHeight;

                const thinkingId = 'thinking-' + Date.now();
                conv.innerHTML += `<div class="bot-message" id="${thinkingId}">如律令：咻——让我想想...</div>`;

                const reply = await getAIResponse(text);

                document.getElementById(thinkingId)?.remove();
                conv.innerHTML += `<div class="bot-message">如律令：${reply}</div>`;

                if (currentMode === 'private') {
                    messages.push({role: 'assistant', text: reply});
                    localStorage.setItem('ruling_history', JSON.stringify(messages));
                }

                conv.scrollTop = conv.scrollHeight;
            }
        });
    </script>
</body>
</html>
