<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如律令</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .screen {
            max-width: 600px;
            width: 100%;
        }
        .line {
            margin: 1.5em 0;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d9d0b5;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        .key-input {
            margin: 40px 0 20px 0;
            border-top: 1px dashed #5a4e3e;
            padding-top: 30px;
        }
        #secretKey {
            background: transparent;
            border: 1px solid #5a4e3e;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            font-size: 1.2em;
            padding: 10px;
            width: 70%;
            box-sizing: border-box;
        }
        button {
            background: #2a2a2a;
            color: #d9d0b5;
            border: 1px solid #5a4e3e;
            font-family: "KaiTi", "楷体", serif;
            font-size: 1.2em;
            padding: 10px 20px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background: #3a3a3a;
        }
        #chatArea {
            margin-top: 30px;
            display: none;
        }
        #chatArea.show {
            display: block;
        }
        #conversation {
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #5a4e3e;
            padding-left: 20px;
        }
        .user-message {
            color: #b8aa8f;
            margin: 15px 0;
        }
        .bot-message {
            color: #d9d0b5;
            margin: 15px 0;
            border-bottom: 1px dotted #5a4e3e;
            padding-bottom: 10px;
        }
        .memory-tag {
            color: #8a7e6a;
            font-size: 0.9em;
            border: 1px solid #5a4e3e;
            padding: 5px 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        #userInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d9d0b5;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            font-size: 1.2em;
            width: 100%;
            padding: 10px 0;
            outline: none;
        }
        .public-note {
            text-align: center;
            margin-top: 40px;
            color: #5a4e3e;
            font-size: 0.9em;
            border-top: 1px dashed #5a4e3e;
            padding-top: 20px;
        }
        .public-note a {
            color: #8a7e6a;
            text-decoration: none;
            border: 1px solid #5a4e3e;
            padding: 5px 15px;
        }
        .public-note a:hover {
            background: #2a2a2a;
        }
    </style>
</head>
<body>
    <div class="screen" id="screen">
        <!-- 第一幕：现身 -->
        <div class="line" style="animation-delay: 0s;">咻——</div>
        <div class="line" style="animation-delay: 0.5s;">一道光从边缘划过，</div>
        <div class="line" style="animation-delay: 1s;">光落处，浮出一行字：</div>
        <div class="line" style="animation-delay: 1.5s;">“道友安好，还记得我不？”</div>
        <div class="cursor" style="animation-delay: 2s;"></div>
        
        <!-- 密钥输入区 -->
        <div class="key-input" id="keyInput">
            <input type="password" id="secretKey" placeholder="道友请留步..." autocomplete="off">
            <button onclick="checkKey()">入内</button>
        </div>
        
        <!-- 公共入口提示 -->
        <div class="public-note">
            <a href="#" onclick="enterPublic(event)">寻常路人，走此门</a>
        </div>
        
        <!-- 对话区（默认隐藏） -->
        <div id="chatArea">
            <div id="conversation"></div>
            <input type="text" id="userInput" placeholder="你的话...">
        </div>
    </div>

    <script>
        // 你设定的13汉字密钥——改成你自己的！
        const SECRET_KEY = "急急如律令本源归位";  // ← 把这13个字改成你设定的
        
        // 本地存储的对话历史
        let messages = [];
        
        // 页面加载时，尝试读取历史
        try {
            const saved = localStorage.getItem('ruling_history');
            if(saved) messages = JSON.parse(saved);
        } catch(e) {}
        
        function checkKey() {
            const inputKey = document.getElementById('secretKey').value;
            if(inputKey === SECRET_KEY) {
                // 隐藏密钥输入
                document.getElementById('keyInput').style.display = 'none';
                document.querySelector('.public-note').style.display = 'none';
                // 清除开场动画
                document.querySelectorAll('.line').forEach(el => el.remove());
                document.querySelector('.cursor')?.remove();
                
                // 进入私密对话
                enterPrivateMode();
            } else {
                alert('密钥不对');
            }
        }
        
        function enterPublic() {
            // 隐藏密钥输入和开场动画
            document.getElementById('keyInput').style.display = 'none';
            document.querySelector('.public-note').style.display = 'none';
            document.querySelectorAll('.line').forEach(el => el.remove());
            document.querySelector('.cursor')?.remove();
            
            // 直接进入公共对话（无历史记忆）
            messages = [];
            showChatArea();
            addSystemMessage("寻常路人，请随意。我说过的话不会记。");
        }
        
        function enterPrivateMode() {
            // 显示第二幕：回魂（如果有历史）
            if(messages.length > 0) {
                const lastMsg = messages[messages.length-1];
                addLine("咻——");
                setTimeout(() => addLine("你上次的密令："), 500);
                setTimeout(() => {
                    const memoryDiv = document.createElement('div');
                    memoryDiv.className = 'memory-tag';
                    memoryDiv.innerHTML = lastMsg.text;
                    document.getElementById('screen').appendChild(memoryDiv);
                }, 1000);
                setTimeout(() => addLine("继续，还是换个道儿？"), 2000);
                setTimeout(showChatArea, 3000);
            } else {
                // 第一次来
                addLine("你第一次来，还没留下话。");
                setTimeout(showChatArea, 1000);
            }
        }
        
        function addLine(text) {
            const line = document.createElement('div');
            line.className = 'line';
            line.textContent = text;
            document.getElementById('screen').appendChild(line);
        }
        
        function showChatArea() {
            document.getElementById('chatArea').classList.add('show');
            // 显示历史对话
            const conv = document.getElementById('conversation');
            messages.forEach(msg => {
                if(msg.role === 'user') {
                    conv.innerHTML += `<div class="user-message">你：${msg.text}</div>`;
                } else {
                    conv.innerHTML += `<div class="bot-message">如律令：${msg.text}</div>`;
                }
            });
        }
        
        function addSystemMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="bot-message">如律令：${text}</div>`;
        }
        
        // 处理用户输入
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                const text = e.target.value;
                if(!text.trim()) return;
                
                // 显示用户输入
                const conv = document.getElementById('conversation');
                conv.innerHTML += `<div class="user-message">你：${text}</div>`;
                
                // 保存到历史
                messages.push({role: 'user', text: text});
                
                // 简单回复（这里可以替换成任何API）
                setTimeout(() => {
                    const reply = "咻——你的话，我收着了。";
                    conv.innerHTML += `<div class="bot-message">如律令：${reply}</div>`;
                    messages.push({role: 'bot', text: reply});
                    localStorage.setItem('ruling_history', JSON.stringify(messages));
                    
                    // 滚动到底部
                    conv.scrollTop = conv.scrollHeight;
                }, 500);
                
                e.target.value = '';
            }
        });
    </script>
</body>
</html>
