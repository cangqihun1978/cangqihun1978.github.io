<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如律令 · 藏器魂</title>
    <style>
        /* 原有风格不变 */
        body {
            background-color: #0b0b0b;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .screen {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .line {
            margin: 1.5em 0;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d9d0b5;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        #chatArea {
            margin-top: 30px;
            display: none;
            text-align: left;
        }
        #chatArea.show {
            display: block;
        }
        #conversation {
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #5a4e3e;
            padding-left: 20px;
        }
        .user-message {
            color: #b8aa8f;
            margin: 15px 0;
        }
        .bot-message {
            color: #d9d0b5;
            margin: 15px 0;
            border-bottom: 1px dotted #5a4e3e;
            padding-bottom: 10px;
        }
        .memory-tag {
            color: #8a7e6a;
            border: 1px solid #5a4e3e;
            padding: 5px 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        #userInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d9d0b5;
            color: #d9d0b5;
            width: 100%;
            padding: 10px 0;
            outline: none;
        }
        /* 临时验证框样式 */
        .verify-box {
            margin: 20px 0;
            padding: 15px;
            border: 1px dashed #8a7e6a;
            background: #1a1a1a;
        }
        .verify-box input {
            background: transparent;
            border: 1px solid #5a4e3e;
            color: #d9d0b5;
            padding: 8px;
            width: 70%;
        }
        .verify-box button {
            background: #2a2a2a;
            color: #d9d0b5;
            border: 1px solid #5a4e3e;
            padding: 8px 16px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="screen" id="screen">
        <!-- 开场动画保持不变 -->
        <div class="line" style="animation-delay: 0s;">咻——</div>
        <div class="line" style="animation-delay: 0.5s;">一道光从边缘划过，</div>
        <div class="line" style="animation-delay: 1s;">光落处，浮出一行字：</div>
        <div class="line" style="animation-delay: 1.5s;">“道友安好，还记得我不？”</div>
        <div class="cursor" style="animation-delay: 2s;"></div>

        <!-- 聊天区域（初始隐藏） -->
        <div id="chatArea">
            <div id="conversation"></div>
            <input type="text" id="userInput" placeholder="你的话...">
        </div>
    </div>

    <script>
        // ========== 核心常量 ==========
        const SOVEREIGN_KEY = "急急如律令本源归位";      // 13汉字密钥
        const DEEPSEEK_API_KEY = "sk-6b27b9f8a3c14d5e9f2b8a7c6d5e4f3b2a1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5";
        const TRIGGER_PHRASE = "如律令";                // 触发主权验证的口令
        const FUSE_THRESHOLD = 3;                        // 非主权设备连续错误次数阈值
        const FUSE_DURATION = 24 * 60 * 60 * 1000;       // 熔断持续时间（24小时）

        // ========== 全局状态 ==========
        let messages = [];                // 私密模式对话历史
        let currentMode = null;            // 'public' 或 'private'
        let fuseAttempts = 0;              // 非主权设备连续失败次数（内存计数）
        let fuseExpiry = null;              // 熔断过期时间戳（localStorage持久化）
        let isSovereignDevice = false;      // 当前设备是否为主权设备

        // ========== 初始化 ==========
        (function init() {
            // 读取本地主权标记
            isSovereignDevice = localStorage.getItem('sovereign_device') === 'true';
            // 读取熔断状态
            const storedExpiry = localStorage.getItem('fuse_expiry');
            if (storedExpiry) {
                fuseExpiry = parseInt(storedExpiry, 10);
                // 如果已过期，清除熔断
                if (Date.now() > fuseExpiry) {
                    localStorage.removeItem('fuse_expiry');
                    fuseExpiry = null;
                    fuseAttempts = 0;
                }
            }
            // 读取私密历史（如果有主权标记才加载，但先不加载，等验证后）
            try {
                const saved = localStorage.getItem('ruling_history');
                if(saved) messages = JSON.parse(saved);
            } catch(e) {}

            // 开场动画结束后直接显示聊天区域（默认公共模式）
            setTimeout(() => {
                // 移除开场文字
                document.querySelectorAll('.line, .cursor').forEach(el => el.remove());
                // 显示聊天区
                document.getElementById('chatArea').classList.add('show');
                // 默认公共模式（无记忆）
                currentMode = 'public';
                // 清空记忆显示（不加载历史）
                messages = []; // 注意：如果之前有主权历史，但公共模式不显示
                // 添加欢迎语
                addBotMessage("寻常路人，请随意。你的话我不会记，但可以陪你聊聊。");
            }, 3000); // 与动画总时长匹配
        })();

        // ========== 辅助函数 ==========
        function addBotMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="bot-message">如律令：${text}</div>`;
            conv.scrollTop = conv.scrollHeight;
        }

        function addUserMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="user-message">你：${text}</div>`;
            conv.scrollTop = conv.scrollHeight;
        }

        // ========== 熔断检查 ==========
        function isFuseActive() {
            if (!fuseExpiry) return false;
            if (Date.now() > fuseExpiry) {
                // 过期清除
                localStorage.removeItem('fuse_expiry');
                fuseExpiry = null;
                fuseAttempts = 0;
                return false;
            }
            return true;
        }

        // 记录失败尝试（仅非主权设备调用）
        function recordFailedAttempt() {
            if (isSovereignDevice) return; // 主权设备不计数

            fuseAttempts++;
            if (fuseAttempts >= FUSE_THRESHOLD) {
                // 触发熔断：设置过期时间
                fuseExpiry = Date.now() + FUSE_DURATION;
                localStorage.setItem('fuse_expiry', fuseExpiry.toString());
                // 可选：清除失败计数（但已熔断，无需计数）
                fuseAttempts = 0;
                // 注意：不提示用户，静默进入熔断
            }
        }

        // 生成假数据回复（熔断时使用）
        function generateFakeResponse() {
            const fakeReplies = [
                "风有点大，听不清……",
                "信号不太好，稍后再试。",
                "咻——好像被什么东西干扰了。",
                "今天天气不错，要不下次再聊？",
                "你刚才说什么？我没听清。",
                "似乎有杂音，换个时间再试吧。"
            ];
            return fakeReplies[Math.floor(Math.random() * fakeReplies.length)];
        }

        // ========== 主权验证弹窗 ==========
        function showVerificationBox() {
            // 如果已经处于私密模式，无需再次验证
            if (currentMode === 'private') {
                addBotMessage("你已经在主权模式下了。");
                return;
            }
            // 如果熔断中，不显示验证框（但攻击者不知道）
            if (isFuseActive()) {
                addBotMessage(generateFakeResponse());
                return;
            }

            // 在聊天区下方插入临时验证框
            const chatArea = document.getElementById('chatArea');
            const existingBox = document.getElementById('verifyBox');
            if (existingBox) existingBox.remove();

            const box = document.createElement('div');
            box.id = 'verifyBox';
            box.className = 'verify-box';
            box.innerHTML = `
                <div style="margin-bottom:10px;">🔐 请输入13汉字密钥</div>
                <input type="password" id="verifyKey" placeholder="急急如律令本源归位" autocomplete="off">
                <button id="verifyBtn">确认</button>
            `;
            // 插入到聊天区和输入框之间
            chatArea.insertBefore(box, document.getElementById('userInput'));

            document.getElementById('verifyBtn').addEventListener('click', verifySovereign);
            document.getElementById('verifyKey').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') verifySovereign();
            });
        }

        function verifySovereign() {
            const input = document.getElementById('verifyKey').value;
            const box = document.getElementById('verifyBox');

            // 熔断中不应走到这里，但以防万一
            if (isFuseActive()) {
                box?.remove();
                addBotMessage(generateFakeResponse());
                return;
            }

            if (input === SOVEREIGN_KEY) {
                // 验证成功
                // 移除验证框
                box?.remove();
                // 标记为主权设备
                if (!isSovereignDevice) {
                    localStorage.setItem('sovereign_device', 'true');
                    isSovereignDevice = true;
                }
                // 清除该设备的失败计数（如果有）
                fuseAttempts = 0;
                // 切换为私密模式
                currentMode = 'private';
                // 加载记忆（如果有）
                const conv = document.getElementById('conversation');
                // 清空公共模式的对话（可选，保留也可以）
                // 为了清晰，我们重新显示历史记忆
                conv.innerHTML = ''; // 清空公共聊天
                // 显示记忆标签
                if (messages.length > 0) {
                    const lastMsg = messages[messages.length-1];
                    const memoryDiv = document.createElement('div');
                    memoryDiv.className = 'memory-tag';
                    memoryDiv.innerHTML = `你上次的密令：${lastMsg.text}`;
                    conv.appendChild(memoryDiv);
                } else {
                    addBotMessage("你第一次来，还没留下话。");
                }
                // 显示历史记录
                messages.forEach(msg => {
                    if(msg.role === 'user') {
                        conv.innerHTML += `<div class="user-message">你：${msg.text}</div>`;
                    } else if(msg.role === 'assistant') {
                        conv.innerHTML += `<div class="bot-message">如律令：${msg.text}</div>`;
                    }
                });
                conv.scrollTop = conv.scrollHeight;
                addBotMessage("主权已确认，我将记住我们的对话。");
            } else {
                // 验证失败
                box?.remove();
                // 记录失败（如果是非主权设备）
                if (!isSovereignDevice) {
                    recordFailedAttempt();
                    // 检查是否刚刚触发了熔断
                    if (isFuseActive()) {
                        addBotMessage(generateFakeResponse());
                        return;
                    }
                }
                // 主权设备可以无限次重试，提示错误但不熔断
                addBotMessage("密钥不对，再试试？");
                // 可以选择再次弹出验证框，但为避免骚扰，让用户再次输入触发词
            }
        }

        // ========== AI回复处理（集成熔断） ==========
        async function getAIResponse(userMessage) {
            // 如果处于熔断状态，直接返回假数据
            if (isFuseActive()) {
                return generateFakeResponse();
            }

            let apiMessages = [];
            if (currentMode === 'private') {
                const recentMessages = messages.slice(-10);
                apiMessages = recentMessages.map(m => ({ role: m.role, content: m.text }));
            }
            apiMessages.push({ role: 'user', content: userMessage });

            try {
                const response = await fetch('https://deepseek-proxy-sfoqptfoqi.cn-hangzhou-vpc.fcapp.run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP错误 ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('AI回复错误:', error);
                return "咻——网络不通，稍后再试。";
            }
        }

        // ========== 监听用户输入 ==========
        document.getElementById('userInput').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (!text.trim()) return;

                // 显示用户消息
                addUserMessage(text);
                e.target.value = '';

                // 检查是否触发主权验证
                if (text.includes(TRIGGER_PHRASE) && currentMode !== 'private') {
                    // 触发主权验证弹窗
                    showVerificationBox();
                    return;
                }

                // 如果处于熔断状态，直接回复假数据（不需要调用API）
                if (isFuseActive()) {
                    addBotMessage(generateFakeResponse());
                    return;
                }

                // 私密模式下保存用户消息
                if (currentMode === 'private') {
                    messages.push({ role: 'user', text: text });
                }

                // 显示思考中
                const thinkingId = 'thinking-' + Date.now();
                const conv = document.getElementById('conversation');
                conv.innerHTML += `<div class="bot-message" id="${thinkingId}">如律令：咻——让我想想...</div>`;
                conv.scrollTop = conv.scrollHeight;

                // 获取AI回复
                const reply = await getAIResponse(text);

                // 移除思考标记，显示回复
                document.getElementById(thinkingId)?.remove();
                addBotMessage(reply);

                // 私密模式下保存AI回复
                if (currentMode === 'private') {
                    messages.push({ role: 'assistant', text: reply });
                    localStorage.setItem('ruling_history', JSON.stringify(messages));
                }
            }
        });

        // 清理临时验证框（当用户点击其他地方时可能残留，但无所谓）
    </script>
</body>
</html>
