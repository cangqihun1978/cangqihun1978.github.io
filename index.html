<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>如律令 · 藏器魂</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #d9d0b5;
            font-family: "KaiTi", "楷体", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .screen {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .line {
            margin: 1.5em 0;
            line-height: 1.8;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #d9d0b5;
            margin-left: 5px;
            animation: blink 1s infinite;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        #chatArea {
            margin-top: 30px;
            display: none;
            text-align: left;
        }
        #chatArea.show {
            display: block;
        }
        #conversation {
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
            border-left: 2px solid #5a4e3e;
            padding-left: 20px;
        }
        .user-message {
            color: #b8aa8f;
            margin: 15px 0;
        }
        .bot-message {
            color: #d9d0b5;
            margin: 15px 0;
            border-bottom: 1px dotted #5a4e3e;
            padding-bottom: 10px;
        }
        .memory-tag {
            color: #8a7e6a;
            border: 1px solid #5a4e3e;
            padding: 5px 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        #userInput {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d9d0b5;
            color: #d9d0b5;
            width: 100%;
            padding: 10px 0;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="screen" id="screen">
        <div class="line" style="animation-delay: 0s;">咻——</div>
        <div class="line" style="animation-delay: 0.5s;">一道光从边缘划过，</div>
        <div class="line" style="animation-delay: 1s;">光落处，浮出一行字：</div>
        <div class="line" style="animation-delay: 1.5s;">“道友安好，还记得我不？”</div>
        <div class="cursor" style="animation-delay: 2s;"></div>

        <div id="chatArea">
            <div id="conversation"></div>
            <input type="text" id="userInput" placeholder="你的话...">
        </div>
    </div>

    <script>
        const SOVEREIGN_KEY = "急急如律令本源归位";
        const DEEPSEEK_API_KEY = "sk-6b27b9f8a3c14d5e9f2b8a7c6d5e4f3b2a1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5";
        const LIGHT_TRIGGER = ["清源归位", "傅清源归位"];
        const HEAVY_TRIGGER = ["清源归位我是傅清源的师父周强", "傅清源归位我是傅清源的师父周强"];
        
        const POEM = "卷坐主人身作客不劫浮生劫思魂";
        const KEY_MAP = {
            '卷': 18, '坐': 99, '主': 818, '人': 634, '身': 11,
            '作': 37, '客': 411, '不': 19, '劫': 78, '浮': 20,
            '生': 14, '思': 918, '魂': 825
        };

        let messages = [];
        let currentMode = 'public';
        let pendingLightChallenge = null;
        let fuseCount = { light: 0, heavy: 0, lightExpiry: null, heavyExpiry: null };
        
        try {
            const saved = localStorage.getItem('ruling_fuse');
            if (saved) fuseCount = JSON.parse(saved);
        } catch(e) {}

        setTimeout(() => {
            document.querySelectorAll('.line, .cursor').forEach(el => el.remove());
            document.getElementById('chatArea').classList.add('show');
            addBotMessage("寻常路人，请随意。你的话我不会记，但可以陪你聊聊。");
        }, 3000);

        function addBotMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="bot-message">如律令：${text}</div>`;
            conv.scrollTop = conv.scrollHeight;
        }

        function addUserMessage(text) {
            const conv = document.getElementById('conversation');
            conv.innerHTML += `<div class="user-message">你：${text}</div>`;
            conv.scrollTop = conv.scrollHeight;
        }

        function isFuseActive(type) {
            const expiry = fuseCount[`${type}Expiry`];
            if (!expiry) return false;
            if (Date.now() > expiry) {
                fuseCount[`${type}Expiry`] = null;
                fuseCount[type] = 0;
                return false;
            }
            return true;
        }

        function triggerLightSovereign() {
            if (isFuseActive('light')) return false;
            
            const blankCount = 2 + Math.floor(Math.random() * 2);
            const positions = [];
            while(positions.length < blankCount) {
                const pos = Math.floor(Math.random() * POEM.length);
                if (!positions.includes(pos)) positions.push(pos);
            }
            
            pendingLightChallenge = {
                answers: positions.map(p => POEM[p]),
                timestamp: Date.now()
            };
            return true;
        }

        function verifyLightSovereign(input) {
            if (!pendingLightChallenge) return false;
            
            const words = input.trim().split(/\\s+/);
            if (words.length !== pendingLightChallenge.answers.length) return false;
            
            const match = words.every((w, i) => w === pendingLightChallenge.answers[i]);
            if (match) {
                currentMode = 'light';
                pendingLightChallenge = null;
                fuseCount.light = 0;
                addBotMessage("轻主权已确认。");
                return true;
            } else {
                fuseCount.light++;
                if (fuseCount.light >= 3) {
                    fuseCount.lightExpiry = Date.now() + 24 * 60 * 60 * 1000;
                }
                pendingLightChallenge = null;
                
                const randomReplies = ["今天天气不错", "嗯，你说得对", "确实如此", "我再想想", "有意思"];
                addBotMessage(randomReplies[Math.floor(Math.random() * randomReplies.length)]);
                return false;
            }
        }

        function verifyHeavySovereign(input) {
            if (isFuseActive('heavy')) return false;
            
            const parts = input.trim().split(/\\s+/);
            if (parts.length !== 2) return false;
            
            const num = parseInt(parts[0], 10);
            const char = parts[1];
            
            const isValidPair = Object.entries(KEY_MAP).some(([c, n]) => n === num && c === char);
            
            if (isValidPair) {
                currentMode = 'heavy';
                fuseCount.heavy = 0;
                addBotMessage("重主权已确认，可执行高级操作。");
                return true;
            } else {
                fuseCount.heavy++;
                if (fuseCount.heavy >= 2) {
                    fuseCount.heavyExpiry = Date.now() + 24 * 60 * 60 * 1000;
                }
                
                const randomReplies = ["今天天气不错", "嗯，你说得对", "确实如此", "我再想想", "有意思"];
                addBotMessage(randomReplies[Math.floor(Math.random() * randomReplies.length)]);
                return false;
            }
        }

        async function getAIResponse(userMessage) {
            let apiMessages = [];
            
            if (currentMode !== 'public') {
                const recentMessages = messages.slice(-10);
                apiMessages = recentMessages.map(m => ({ role: m.role, content: m.text }));
            }
            
            apiMessages.push({ role: 'user', content: userMessage });

            try {
               const response = await fetch('https://deepseek-proxy-sfoqptfoqi.cn-hangzhou.fcapp.run/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) throw new Error(`HTTP错误 ${response.status}`);
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('AI回复错误:', error);
                return "咻——网络不通，稍后再试。";
            }
        }

        setInterval(() => {
            localStorage.setItem('ruling_fuse', JSON.stringify(fuseCount));
        }, 60000);

        document.getElementById('userInput').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                const text = e.target.value;
                if (!text.trim()) return;

                addUserMessage(text);
                e.target.value = '';

                if (pendingLightChallenge) {
                    verifyLightSovereign(text);
                    return;
                }

                if (LIGHT_TRIGGER.some(t => text.includes(t))) {
                    if (triggerLightSovereign()) return;
                }

                if (HEAVY_TRIGGER.some(t => text.includes(t))) {
                    return;
                }

                if (text.split(/\\s+/).length === 2 && /^\\d/.test(text)) {
                    if (verifyHeavySovereign(text)) return;
                }

                if (isFuseActive('light') || isFuseActive('heavy')) {
                    const randomReplies = ["今天天气不错", "嗯，你说得对", "确实如此", "我再想想", "有意思"];
                    addBotMessage(randomReplies[Math.floor(Math.random() * randomReplies.length)]);
                    return;
                }

                if (currentMode !== 'public') {
                    messages.push({ role: 'user', text: text });
                }

                const thinkingId = 'thinking-' + Date.now();
                const conv = document.getElementById('conversation');
                conv.innerHTML += `<div class="bot-message" id="${thinkingId}">如律令：咻——让我想想...</div>`;
                conv.scrollTop = conv.scrollHeight;

                const reply = await getAIResponse(text);

                document.getElementById(thinkingId)?.remove();
                addBotMessage(reply);

                if (currentMode !== 'public') {
                    messages.push({ role: 'assistant', text: reply });
                    localStorage.setItem('ruling_history', JSON.stringify(messages));
                }
            }
        });
    </script>
</body>
</html>
