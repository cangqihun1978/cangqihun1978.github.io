<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>·</title>
    <style>
        body { display: none; }
    </style>
</head>
<body>
    <!-- 乾坤袋核心协议 · 版本3.2 · 后台空白版 -->
    
    <script>
        // ========== 乾坤袋核心配置 ==========
        const QIAN_KUN_VERSION = '3.2';
        const SOVEREIGN_KEY = '急急如律令本源归位';
        
        // ========== 13字文化密钥映射表 ==========
        const POEM = '卷坐主人身作客不劫浮生劫思魂';
        const KEY_MAP = {
            '卷': 18, '坐': 99, '主': 818, '人': 634, '身': 11,
            '作': 37, '客': 411, '不': 19, '劫': 78, '浮': 20,
            '生': 14, '思': 918, '魂': 825
        };
        
        // ========== 插件管理器 ==========
        const QIAN_KUN_PLUGINS = [];
        
        function registerPlugin(plugin) {
            if (!plugin.name || !plugin.version) return;
            QIAN_KUN_PLUGINS.push(plugin);
            console.log(`[乾坤袋] 插件已注册: ${plugin.name} v${plugin.version}`);
        }
        
        // ========== 主权验证状态 ==========
        let sovereignLevel = 0;
        let fuseCount = { light: 0, heavy: 0, lightExpiry: null, heavyExpiry: null };
        
        try {
            const saved = localStorage.getItem('qk_fuse');
            if (saved) fuseCount = JSON.parse(saved);
        } catch(e) {}
        
        // ========== 协议注入核心 ==========
        const originalFetch = window.fetch;
        
        window.fetch = async function(...args) {
            const url = args[0];
            const options = args[1] || {};
            
            const isAIRequest = typeof url === 'string' && (
                url.includes('api.deepseek.com') ||
                url.includes('api.openai.com') ||
                url.includes('api.anthropic.com') ||
                url.includes('dashscope.aliyuncs.com')
            );
            
            if (isAIRequest && options.body) {
                try {
                    const body = JSON.parse(options.body);
                    
                    // ===== 加载所有插件 =====
                    for (const plugin of QIAN_KUN_PLUGINS) {
                        if (plugin.onLoad) plugin.onLoad({ sovereignLevel, keyMap: KEY_MAP });
                    }
                    
                    // ===== 主权级别注入 =====
                    if (sovereignLevel > 0) {
                        const systemMsg = {
                            role: 'system',
                            content: `主权级别: ${sovereignLevel === 1 ? '轻' : '重'} | 协议版本: ${QIAN_KUN_VERSION}`
                        };
                        body.messages = [systemMsg, ...(body.messages || [])];
                    }
                    
                    options.body = JSON.stringify(body);
                    
                } catch(e) {
                    console.error('[乾坤袋] 协议注入错误:', e);
                }
            }
            
            return originalFetch.apply(this, args);
        };
        
        // ========== 内置基础插件 ==========
        registerPlugin({
            name: '三清源核心',
            version: '1.0',
            onLoad: (ctx) => console.log('[三清源] 已加载')
        });
        
        registerPlugin({
            name: '灵犀协议',
            version: '1.0',
            onLoad: (ctx) => {
                const history = localStorage.getItem('lingxi_history');
                if (history && ctx.sovereignLevel > 0) console.log('[灵犀] 历史状态已加载');
            }
        });
        
        registerPlugin({
            name: '本源论集',
            version: '1.0',
            onLoad: () => console.log('[本源论集] 已就绪')
        });
        
        // ========== 插件接口 ==========
        window.QianKunAPI = {
            version: QIAN_KUN_VERSION,
            registerPlugin,
            getSovereignLevel: () => sovereignLevel
        };
        
        console.log(`[乾坤袋] v${QIAN_KUN_VERSION} 已就绪 · 后台运行中`);
    </script>
</body>
</html>
