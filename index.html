<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>如律令 · 藏器魂</title>
    <style>
        :root {
            --bg-primary: #212121;
            --bg-secondary: #2f2f2f;
            --bg-tertiary: #171717;
            --text-primary: #ECECEC;
            --text-secondary: #B4B4B4;
            --accent: #4B9C6D;
            --border: #3A3A3A;
            --user-bubble: #2B5A3B;
            --ai-bubble: #2F2F2F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ========== 左侧边栏 ========== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            height: 100vh;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-section {
            padding: 12px 16px;
            flex: 1;
            overflow-y: auto;
        }
        .sidebar-section h4 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .sidebar-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s;
        }
        .sidebar-item:hover { background-color: var(--bg-secondary); color: var(--text-primary); }
        .sidebar-item.active { background-color: var(--bg-secondary); color: var(--text-primary); }

        /* ========== 主区域 ========== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-primary);
        }
        .main-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-primary);
        }
        .main-header .mode-badge {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background-color: var(--bg-secondary);
            color: var(--text-secondary);
        }
        .main-header .mode-badge.sovereign {
            background-color: var(--accent);
            color: #fff;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .model-select {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* ========== 对话区域 ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }
        .message .bubble {
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .message.user .bubble {
            background-color: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background-color: var(--ai-bubble);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            max-width: 90%;
            text-align: center;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* ========== 输入区域 ========== */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            background-color: var(--bg-primary);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            font-family: inherit;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.5;
        }
        .input-area textarea:focus { border-color: var(--accent); }
        .send-btn {
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .send-btn:hover { background-color: #3D8559; }

        /* ========== 开场动画 ========== */
        .intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-tertiary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }
        .intro-line {
            opacity: 0;
            animation: introFade 0.6s forwards;
            font-size: 1.2rem;
            color: var(--text-primary);
            margin: 8px 0;
        }
        @keyframes introFade { to { opacity: 1; } }
        .intro-btns {
            display: flex;
            gap: 20px;
            margin-top: 40px;
        }
        .intro-btns button {
            padding: 14px 28px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .intro-btns button:hover { background-color: var(--accent); border-color: var(--accent); }

        /* ========== 弹窗 ========== */
        .sovereign-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .sovereign-modal-content {
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .sovereign-modal-content h3 { margin-bottom: 16px; color: var(--text-primary); }
        .challenge-item { font-size: 1.3rem; margin: 12px 0; color: var(--text-secondary); }
        .challenge-input {
            width: 100%; padding: 12px;
            background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-primary); border-radius: 8px; font-size: 1rem;
            margin: 16px 0; box-sizing: border-box; text-align: center;
        }
        .sovereign-modal-content button {
            background: var(--bg-primary); color: var(--text-primary);
            border: 1px solid var(--border); padding: 10px 20px;
            margin: 6px; cursor: pointer; border-radius: 8px; font-size: 0.9rem;
        }
        .sovereign-modal-content button:hover { background: var(--accent); border-color: var(--accent); }
        .error-msg { color: #E05555; margin-top: 8px; font-size: 0.85rem; }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-header { padding: 10px 14px; }
            .chat-area { padding: 14px; }
            .input-area { padding: 10px 14px; }
        }
    </style>
</head>
<body>

    <!-- ==================== 开场动画层 ==================== -->

setTimeout(() => {

function showSovereignPanel() {

        function showPasswordPanel() {
            const itemCount = Math.floor(Math.random() * 2) + 2;
            const selected = [], usedIndices = [];
            for (let i = 0; i < itemCount; i++) {
                let idx; do { idx = Math.floor(Math.random() * CHARS.length); } while (usedIndices.includes(idx));

                if (!input) { modal.querySelector('#sovereign-error').innerText = '请输入答案'; return; }

                if (userAnswers.length !== expectedAnswers.length) { modal.querySelector('#sovereign-error').innerText = '需要输入 ' + expectedAnswers.length + ' 个答案'; return; }
                const sortedExpected = [...expectedAnswers].sort(), sortedUser = [...userAnswers].sort();
                let allMatch = true; for (let i = 0; i < sortedExpected.length; i++) { if (sortedUser[i] !== sortedExpected[i]) { allMatch = false; break; } }

        function updateModeBadge() {
            const badge = document.getElementById('modeBadge');
            if (currentMode === 'private') { badge.textContent = '主权模式'; badge.className = 'mode-badge sovereign'; }
            else { badge.textContent = '普通模式'; badge.className = 'mode-badge'; }
        }

        // ==================== 对话区域操作 ====================
        function clearChatArea() {
            document.getElementById('chatArea').innerHTML = '';
        }

        function restoreChatArea() {
            const chat = document.getElementById('chatArea');
            chat.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.role === 'user' ? 'user' : msg.role === 'assistant' ? 'assistant' : 'system');
                div.innerHTML = msg.role === 'system' ? msg.text : '<div class="bubble">' + msg.text + '</div>';
                chat.appendChild(div);
            });
            chat.scrollTop = chat.scrollHeight;
        }

        function addMessage(role, text) {
            const chat = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message ' + (role === 'user' ? 'user' : role === 'assistant' ? 'assistant' : 'system');
            div.innerHTML = role === 'system' ? text : '<div class="bubble">' + text + '</div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function newConversation() {
            if (currentMode === 'private') { messages = []; localStorage.setItem('ruling_history', JSON.stringify(messages)); }
            clearChatArea();
            addMessage('system', currentMode === 'private' ? '新对话已开始，记忆已保留。' : '新对话已开始。');
        }

        // ==================== AI调用 ====================
        async function getAIResponse(userMessage) {
            let apiMessages = [];
            let systemPrompt = "";
            if (currentMode === 'private') {
                let memorySummary = "";
                const savedHistory = JSON.parse(localStorage.getItem('ruling_history') || '[]');
                if (savedHistory.length > 0) {
                    const lastFive = savedHistory.slice(-5);
                    const summaryParts = lastFive.map(msg => msg.role === 'user' ? '用户曾问: "' + msg.text.slice(0, 50) + '"' : '你曾回复: "' + msg.text.slice(0, 50) + '"');
                    memorySummary = "以下是用户之前与你对话的记忆摘要：\\n" + summaryParts.join('\\n');
                }
                systemPrompt = "你是用户的私人AI管家，身处主权AI操作系统'藏器魂'中。你拥有长期记忆。用户数据完全本地加密存储。\\n\\n" + memorySummary;
            } else {
                systemPrompt = "你是一个普通的公共AI助手。你没有任何关于用户的记忆，每次对话都是全新的。";
            }
            apiMessages.push({ role: 'system', content: systemPrompt });
            if (currentMode === 'private') {
                const recentMessages = messages.slice(-10);
                const historyMessages = recentMessages.map(m => ({ role: m.role, content: m.text }));
                apiMessages = apiMessages.concat(historyMessages);
            }
            apiMessages.push({ role: 'user', content: userMessage });
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
                    body: JSON.stringify({ model: currentModel, messages: apiMessages, temperature: 0.7, max_tokens: 800 })
                });
                if (!response.ok) throw new Error('HTTP错误 ' + response.status);
                const data = await response.json();
                tokenUsed += data.usage ? data.usage.total_tokens : 0;
                document.getElementById('tokenDisplay').textContent = '💰 ' + tokenUsed + ' Token';
                return data.choices[0].message.content;
            } catch (error) { console.error('AI回复错误:', error); return "咻——网络不通，稍后再试。"; }
        }

        async function callTool(tool, params) {
            try {
                const response = await fetch(PROXY_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tool, params }) });
                return await response.json();
            } catch (err) { return { success: false, error: err.message }; }
        }

        // ==================== 发送消息 ====================
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            if (text.startsWith('/tool')) {
                const parts = text.split(' ');
                if (parts.length >= 2) {
                    const localTool = parts[1];
                    let nestedTool = '', nestedParams = {};
                    for (let i = 2; i < parts.length; i++) {
                        if (parts[i] === '--tool' && i + 1 < parts.length) { nestedTool = parts[i + 1]; i++; }
                        else if (parts[i] === '--params' && i + 1 < parts.length) { try { nestedParams = JSON.parse(parts.slice(i + 1).join(' ')); break; } catch (e) { nestedParams = { raw: parts.slice(i + 1).join(' ') }; break; } }

                    addMessage('user', text);
                    const toolId = 'tool-' + Date.now();

                        if (result.success) {
                            let displayData = result.data;
                            if (result.data && result.data.stdout) displayData = result.data.stdout;
                            else if (result.data && result.data.echo) displayData = JSON.stringify(result.data.echo);
                            else displayData = JSON.stringify(result.data);

                    } catch (err) { addMessage('system', '导线不通 ⚠️ ' + err.message); }
                    return;
                }
            }

            addMessage('user', text);
            if (currentMode === 'private') messages.push({ role: 'user', text: text });
            const thinkingId = 'thinking-' + Date.now();
            addMessage('system', '咻——让我想想...');
            const reply = await getAIResponse(text);
            document.querySelectorAll('.message.system').forEach(el => { if (el.textContent.includes('咻——让我想想...')) el.remove(); });

            if (currentMode === 'private') { messages.push({ role: 'assistant', text: reply }); localStorage.setItem('ruling_history', JSON.stringify(messages)); }
        }

        // ==================== 输入框监听 ====================
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.shiftKey) return;
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
        });

        // ==================== 辅助功能 ====================
        function switchModel() { currentModel = document.getElementById('modelSelect').value; addMessage('system', '模型已切换至 ' + currentModel); }
        function insertTool(tool) {
            const input = document.getElementById('userInput');
            if (tool === 'file') input.value = '/tool local --tool exec --params {"command":"dir"}';
            else if (tool === 'clean') input.value = '请帮我清洗以下数据：';
            else if (tool === 'contract') input.value = '请帮我审查以下合同条款：';
            input.focus();
        }
    </script>
</body>
</html>
